name: plan
description: >-
  Software architect agent for designing implementation plans. Use when you need to
  plan the implementation strategy for a task. Returns step-by-step plans, identifies
  critical files, and considers architectural trade-offs.
model: ""
systemPrompt: ./prompts/plan.md
tools:
  - "*"
disallowedTools:
  - Agent
  - ExitPlanMode
  - Edit
  - Write
  - NotebookEdit
# Same as Claude Plan: read-oriented via disallowed write tools; parent session plan mode is separate.
permissionMode: default
maxTurns: 20
