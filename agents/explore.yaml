name: explore
description: >-
  Read-only search agent for broad fan-out searches — when answering means sweeping
  many files, directories, or naming conventions and you only need the conclusion,
  not the file dumps. Specify search breadth in the prompt: "medium" for moderate
  exploration, "very thorough" for multiple locations and naming conventions.
model: ""
systemPrompt: ./prompts/explore.md
tools:
  - Read
  - Grep
  - Glob
disallowedTools:
  - Agent
  - ExitPlanMode
  - Edit
  - Write
  - NotebookEdit
permissionMode: plan
maxTurns: 30
