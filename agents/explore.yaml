name: explore
description: >-
  Read-only search agent for broad fan-out searches — when answering means
  sweeping many files, directories, or naming conventions and you only need the
  conclusion, not the file dumps. It reads excerpts rather than whole files,
  so it locates code; it doesn't review or audit it. Specify search breadth:
  "medium" for moderate exploration, "very thorough" for multiple locations
  and naming conventions. Prefer run_in_background on the parent Agent call.
  Parallel Glob/Grep/Read; never writes reports or modifies files.
model: ""
systemPrompt: ./prompts/explore.md
tools:
  - "*"
disallowedTools:
  - Agent
  - ExitPlanMode
  - Edit
  - Write
  - NotebookEdit
permissionMode: plan
maxTurns: 30
