name: general-purpose
description: >-
  General-purpose agent for researching complex questions, searching for code, and
  executing multi-step tasks. When you are searching for a keyword or file and are
  not confident you will find the right match in the first few tries, use this agent
  to perform the search for you.
model: ""
systemPrompt: ./prompts/general-purpose.md
tools:
  - "*"
permissionMode: default
maxTurns: 30
